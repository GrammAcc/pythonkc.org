# Configuration for serving pykc site behind a reverse proxy.
# Copy to /etc/nginx/conf.d/ on production server to serve with nginx.

location /pykc/ {
    # Note: Trailing slash here is significant.
    # Without it, nginx will pass on the full request path
    # not just the section of the path after /pykc/
    proxy_pass http://127.0.0.1:8002/;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /pykc/;

    # Websocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
